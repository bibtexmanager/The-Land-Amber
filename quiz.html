<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lithuania Poke Quiz</title>
  <meta name="description" content="Poke a box, answer a question — discover Lithuania at the carnival booth!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════
       DESIGN SYSTEM — Warm Lithuanian Carnival
       ═══════════════════════════════════════════════ */
    :root {
      --lt-yellow: #FDB913;
      --lt-green: #006A44;
      --lt-red: #C1272D;
      --bg: #FBF6EC;
      --bg-warm: #F5EDD8;
      --card: #FFFFFF;
      --card-shadow: rgba(0,0,0,0.08);
      --text: #1A1A1A;
      --text-dim: #6B6255;
      --correct: #2E8B57;
      --correct-bg: #E6F5EC;
      --wrong: #C1272D;
      --wrong-bg: #FCE8E8;
      --accent: var(--lt-yellow);
      --radius: 20px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', 'Noto Sans TC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Warm background pattern */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(253,185,19,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(0,106,68,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(193,39,45,0.04) 0%, transparent 60%);
    }

    .shell {
      position: relative; z-index: 1;
      max-width: 820px; margin: 0 auto;
      padding: 16px 16px 60px;
    }

    /* ─── Header ─── */
    .header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 24px; margin-bottom: 16px;
      background: var(--card); border-radius: var(--radius);
      box-shadow: 0 2px 12px var(--card-shadow);
      flex-wrap: wrap;
    }
    .flag-stripe {
      display: flex; flex-direction: column;
      width: 8px; height: 48px; border-radius: 4px; overflow: hidden; flex-shrink: 0;
    }
    .flag-stripe div { flex: 1; }
    .fs-y { background: var(--lt-yellow); }
    .fs-g { background: var(--lt-green); }
    .fs-r { background: var(--lt-red); }
    .header h1 {
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      font-weight: 900; letter-spacing: -0.03em; color: var(--text);
    }
    .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    /* ─── Language Switcher ─── */
    .lang-sw {
      display: flex; gap: 2px;
      background: var(--bg-warm); border-radius: 10px; padding: 3px;
    }
    .lang-btn {
      padding: 6px 10px; border: none; border-radius: 8px;
      background: transparent; color: var(--text-dim);
      font-family: inherit; font-size: 0.75rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .lang-btn.active { background: var(--lt-yellow); color: #1A1A1A; }
    .lang-btn:hover:not(.active) { background: rgba(253,185,19,0.3); }

    .back-link {
      color: var(--text-dim); text-decoration: none;
      font-size: 0.8rem; font-weight: 600;
      padding: 7px 14px; border-radius: 10px;
      border: 2px solid #E8E0D0; transition: all 0.2s;
    }
    .back-link:hover { background: var(--bg-warm); border-color: var(--lt-yellow); }

    /* ═══════════════════════════════════════════════
       POKE BOX GRID — Taiwan night-market style
       ═══════════════════════════════════════════════ */
    .poke-screen { text-align: center; }

    .poke-hero {
      padding: 32px 24px 24px;
      margin-bottom: 20px;
      background: var(--card); border-radius: var(--radius);
      box-shadow: 0 2px 12px var(--card-shadow);
      position: relative; overflow: hidden;
    }
    .poke-hero::before, .poke-hero::after {
      content: ''; position: absolute; left: 0; right: 0; height: 5px;
    }
    .poke-hero::before {
      top: 0;
      background: linear-gradient(90deg, var(--lt-yellow) 0% 33%, var(--lt-green) 33% 66%, var(--lt-red) 66% 100%);
    }
    .poke-hero::after {
      bottom: 0;
      background: linear-gradient(90deg, var(--lt-red) 0% 33%, var(--lt-green) 33% 66%, var(--lt-yellow) 66% 100%);
    }
    .poke-hero h2 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 900; letter-spacing: -0.04em;
      margin-bottom: 8px;
    }
    .poke-hero h2 .yellow { color: var(--lt-yellow); }
    .poke-hero h2 .green { color: var(--lt-green); }
    .poke-hero p {
      color: var(--text-dim); font-size: 1rem; line-height: 1.6;
      max-width: 46ch; margin: 0 auto;
    }

    .poke-stats {
      display: flex; gap: 10px; justify-content: center;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .poke-stat {
      background: var(--card); border-radius: 14px;
      padding: 10px 18px; box-shadow: 0 2px 8px var(--card-shadow);
      display: flex; align-items: center; gap: 8px;
    }
    .poke-stat .val {
      font-size: 1.3rem; font-weight: 900;
      color: var(--lt-green);
    }
    .poke-stat .lbl { font-size: 0.78rem; color: var(--text-dim); font-weight: 600; }

    /* The grid of poke boxes */
    .poke-grid-wrap {
      background: var(--card); border-radius: var(--radius);
      padding: 20px; box-shadow: 0 2px 12px var(--card-shadow);
    }
    .poke-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    @media (max-width: 400px) {
      .poke-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .poke-cell {
      aspect-ratio: 1; border: none; border-radius: 20px;
      cursor: pointer; font-family: inherit; font-size: 2.2rem; font-weight: 800;
      color: white; position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .poke-cell:hover:not(.opened):not(.locked) {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .poke-cell:active:not(.opened):not(.locked) {
      transform: scale(0.92);
    }
    .poke-cell.opened {
      opacity: 0.25; cursor: default; transform: scale(0.9);
      filter: grayscale(0.4);
      animation: poke-burst 0.5s ease forwards;
    }
    .poke-cell.locked { cursor: default; }
    .poke-cell.current {
      animation: poke-pop 0.5s ease;
      box-shadow: 0 0 0 4px var(--lt-yellow), 0 8px 24px rgba(253,185,19,0.3);
      transform: scale(1.05);
    }
    @keyframes poke-burst {
      0% { transform: scale(1); opacity: 1; filter: grayscale(0); }
      30% { transform: scale(1.15) rotate(2deg); opacity: 0.8; }
      60% { transform: scale(0.85) rotate(-1deg); opacity: 0.4; }
      100% { transform: scale(0.9); opacity: 0.25; filter: grayscale(0.4); }
    }

    /* Poke cell color palette */
    .poke-c1 { background: linear-gradient(135deg, #FDB913, #F5A623); }
    .poke-c2 { background: linear-gradient(135deg, #006A44, #00855A); }
    .poke-c3 { background: linear-gradient(135deg, #C1272D, #E53E3E); }
    .poke-c4 { background: linear-gradient(135deg, #3B82F6, #60A5FA); }
    .poke-c5 { background: linear-gradient(135deg, #8B5CF6, #A78BFA); }
    .poke-c6 { background: linear-gradient(135deg, #F97316, #FB923C); }
    .poke-c7 { background: linear-gradient(135deg, #EC4899, #F472B6); }
    .poke-c8 { background: linear-gradient(135deg, #14B8A6, #2DD4BF); }

    @keyframes poke-pop {
      0% { transform: scale(1); }
      30% { transform: scale(0.85) rotate(-3deg); }
      60% { transform: scale(1.12) rotate(2deg); }
      100% { transform: scale(1.05) rotate(0); }
    }

    /* ═══════════════════════════════════════════════
       QUESTION SCREEN
       ═══════════════════════════════════════════════ */
    .question-screen {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(251,246,236,0.88); backdrop-filter: blur(8px);
      overflow-y: auto; padding: 20px;
      animation: fade-in 0.3s ease;
    }
    .question-screen.active { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 40px; }
    .question-screen .q-card { max-width: 700px; width: 100%; }
    .question-screen .fb-card,
    .question-screen .fact-card { max-width: 700px; width: 100%; }
    .question-screen .btn-row { max-width: 700px; width: 100%; justify-content: center; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .q-card {
      background: var(--card); border-radius: var(--radius);
      padding: 28px 24px; margin-bottom: 16px;
      box-shadow: 0 2px 12px var(--card-shadow);
      animation: slide-up 0.35s ease;
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Category badge */
    .q-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 14px; border-radius: 10px;
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 14px;
    }
    .q-badge.geo { background: #DBEAFE; color: #2563EB; }
    .q-badge.culture { background: #EDE9FE; color: #7C3AED; }
    .q-badge.food { background: #FFEDD5; color: #EA580C; }
    .q-badge.history { background: #FEF3C7; color: #B45309; }
    .q-badge.sports { background: #DCFCE7; color: #16A34A; }
    .q-badge.nature { background: #CCFBF1; color: #0D9488; }
    .q-badge.flag { background: #FEF3C7; color: #B45309; }

    .q-type-label {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      padding: 3px 8px; border-radius: 6px;
      background: var(--bg-warm); color: var(--text-dim);
      margin-left: 8px; text-transform: uppercase; letter-spacing: 0.05em;
    }

    .q-text {
      font-size: clamp(1.15rem, 3.5vw, 1.5rem);
      font-weight: 700; line-height: 1.35;
      letter-spacing: -0.02em; margin-bottom: 24px;
    }

    /* ─── Visual Area (for flag/image questions) ─── */
    .q-visual {
      display: flex; gap: 12px; justify-content: center;
      flex-wrap: wrap; margin-bottom: 20px;
    }
    .q-visual .mini-flag {
      width: 120px; height: 80px; border-radius: 10px;
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      border: 3px solid #E8E0D0;
    }
    .q-visual .mini-flag div { flex: 1; }

    .q-emoji-display {
      font-size: 4rem; text-align: center;
      margin: 8px 0 16px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }
    .q-image-display {
      width: 100%; max-width: 360px; margin: 8px auto 16px;
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      border: 3px solid #E8E0D0;
    }
    .q-image-display img {
      display: block; width: 100%; height: auto;
      object-fit: cover; max-height: 220px;
    }

    /* ─── Answer Options ─── */
    .options-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .options-grid.single-col { grid-template-columns: 1fr; }

    .opt-btn {
      position: relative; display: flex; align-items: center;
      gap: 12px; padding: 16px 18px; border: 3px solid #E8E0D0;
      border-radius: 16px; background: var(--card);
      cursor: pointer; font-family: inherit;
      font-size: 0.95rem; font-weight: 700; color: var(--text);
      text-align: left; transition: all 0.15s; line-height: 1.3;
    }
    .opt-btn:hover:not(:disabled) {
      border-color: var(--lt-yellow);
      background: #FFFBF0;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(253,185,19,0.2);
    }
    .opt-btn:active:not(:disabled) { transform: scale(0.97); }

    .opt-letter {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 800;
      background: var(--bg-warm); color: var(--text-dim);
      flex-shrink: 0;
    }
    .opt-btn.correct {
      border-color: var(--correct); background: var(--correct-bg);
      animation: opt-correct 0.4s ease;
    }
    .opt-btn.correct .opt-letter { background: var(--correct); color: white; }
    .opt-btn.wrong {
      border-color: var(--wrong); background: var(--wrong-bg);
      animation: opt-wrong 0.4s ease;
    }
    .opt-btn.wrong .opt-letter { background: var(--wrong); color: white; }
    .opt-btn:disabled { cursor: default; opacity: 0.5; }
    .opt-btn.correct:disabled, .opt-btn.wrong:disabled { opacity: 1; }

    @keyframes opt-correct {
      0% { transform: scale(0.95); } 50% { transform: scale(1.04); } 100% { transform: scale(1); }
    }
    @keyframes opt-wrong {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    /* ─── Flag answer options (visual) ─── */
    .opt-flag-btn {
      position: relative; display: flex; flex-direction: column;
      align-items: center; gap: 8px; padding: 14px;
      border: 3px solid #E8E0D0; border-radius: 16px;
      background: var(--card); cursor: pointer;
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      color: var(--text); transition: all 0.15s;
    }
    .opt-flag-btn:hover:not(:disabled) {
      border-color: var(--lt-yellow); background: #FFFBF0;
      transform: translateY(-2px);
    }
    .opt-flag-btn .flag-preview {
      width: 100px; height: 65px; border-radius: 8px;
      overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      position: relative;
    }
    .opt-flag-btn .flag-preview > div { flex: 1; }
    .opt-flag-btn .flag-preview > svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    .opt-flag-btn.correct { border-color: var(--correct); background: var(--correct-bg); }
    .opt-flag-btn.wrong { border-color: var(--wrong); background: var(--wrong-bg); animation: shake-wrong 0.4s ease; }
    .opt-flag-btn:disabled { cursor: default; opacity: 0.5; }
    .opt-flag-btn.correct:disabled, .opt-flag-btn.wrong:disabled { opacity: 1; }
    .opt-btn.correct { border-color: var(--correct) !important; background: var(--correct-bg) !important; animation: pulse-correct 0.6s ease; }
    .opt-btn.wrong { border-color: var(--wrong) !important; background: var(--wrong-bg) !important; animation: shake-wrong 0.4s ease; }
    @keyframes shake-wrong {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes pulse-correct {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); box-shadow: 0 0 20px rgba(46,139,87,0.4); }
      100% { transform: scale(1); }
    }

    @media (max-width: 480px) {
      .options-grid { grid-template-columns: 1fr; }
    }

    /* ─── Feedback ─── */
    .fb-card {
      background: var(--card); border-radius: var(--radius);
      padding: 18px 24px; margin-bottom: 16px;
      box-shadow: 0 2px 12px var(--card-shadow);
      border-left: 5px solid #E8E0D0;
      transition: border-color 0.3s;
    }
    .fb-card.correct-state { border-left-color: var(--correct); background: var(--correct-bg); }
    .fb-card.wrong-state { border-left-color: var(--wrong); background: var(--wrong-bg); }
    .fb-heading { font-weight: 800; font-size: 1rem; margin-bottom: 4px; }
    .fb-body { font-size: 0.85rem; color: var(--text-dim); line-height: 1.5; }

    .fact-card {
      background: #FFFBF0; border-radius: var(--radius);
      padding: 16px 24px; margin-bottom: 16px;
      box-shadow: 0 2px 12px var(--card-shadow);
      border-left: 5px solid var(--lt-yellow);
    }
    .fact-label {
      font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-dim);
      font-weight: 700; margin-bottom: 6px;
    }
    .fact-body { font-size: 0.85rem; line-height: 1.6; color: var(--text-dim); }
    .fact-body strong { color: var(--lt-green); }

    /* ─── Buttons ─── */
    .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    button.btn {
      font-family: inherit; font-weight: 700; border: none; border-radius: 14px;
      padding: 14px 28px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--lt-yellow), #E5A711);
      color: #1A1A1A; box-shadow: 0 3px 12px rgba(253,185,19,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(253,185,19,0.4);
    }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-secondary {
      background: var(--bg-warm); color: var(--text);
      border: 2px solid #E8E0D0 !important;
    }
    .btn-secondary:hover { background: #EDE5D2; }
    .btn-green {
      background: linear-gradient(135deg, var(--lt-green), #00855A);
      color: white; box-shadow: 0 3px 12px rgba(0,106,68,0.3);
    }
    .btn-green:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,106,68,0.4); }

    /* ─── End Overlay ─── */
    .end-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(251,246,236,0.92); backdrop-filter: blur(12px);
      align-items: center; justify-content: center;
    }
    .end-overlay.show { display: flex; }
    .end-box {
      background: var(--card); border-radius: var(--radius);
      padding: 48px 36px; text-align: center;
      max-width: 460px; width: 90%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      animation: pop-in 0.4s ease;
    }
    .end-emoji { font-size: 3.5rem; margin-bottom: 14px; }
    .end-score {
      font-size: 3.2rem; font-weight: 900; letter-spacing: -0.03em;
      color: var(--lt-green);
    }
    .end-label {
      color: var(--text-dim); margin: 8px 0 28px;
      font-size: 0.95rem; line-height: 1.5;
    }
    @keyframes pop-in {
      0% { transform: scale(0.85); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ─── Confetti ─── */
    .confetti-wrap {
      position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden;
    }
    .confetti {
      position: absolute; width: 10px; height: 10px;
      border-radius: 2px; animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ─── iPad / Tablet (768px - 1024px) ─── */
    @media (max-width: 1024px) {
      .shell { padding: 12px 12px 30px; }
      .q-card { padding: 24px 20px; }
      .poke-grid { gap: 10px; }
      .poke-cell { font-size: 1.8rem; border-radius: 16px; }
      .header h1 { font-size: 1.3rem; }
      .opt-btn { padding: 14px 16px; font-size: 0.9rem; min-height: 50px; }
      .opt-flag-btn { padding: 8px; }
      .flag-preview { width: 90px; height: 58px; }
    }

    /* ─── Mobile (< 600px) ─── */
    @media (max-width: 600px) {
      .shell { padding: 8px 8px 20px; }
      .header { padding: 10px 14px; gap: 8px; }
      .header h1 { font-size: 1.1rem; }
      .lang-btn { padding: 5px 8px; font-size: 0.65rem; }
      .back-link { padding: 5px 10px; font-size: 0.7rem; }
      .poke-wrap { padding: 16px 12px; border-radius: 16px; }
      .poke-title { font-size: 1.6rem; }
      .poke-subtitle { font-size: 0.75rem; }
      .poke-grid { gap: 8px; }
      .poke-cell { border-radius: 14px; font-size: 1.5rem; }
      .stat-pill { padding: 6px 10px; font-size: 0.7rem; }
      .q-card { padding: 18px 14px; border-radius: 16px; }
      .q-text { font-size: 1rem; }
      .q-image-display img { max-height: 180px; }
      .options-grid { grid-template-columns: 1fr; gap: 8px; }
      .opt-btn { padding: 12px 14px; font-size: 0.85rem; min-height: 44px; border-radius: 12px; }
      .opt-flag-btn { border-radius: 10px; }
      .flag-preview { width: 80px; height: 52px; }
      .fb-card, .fact-card { padding: 14px 16px; border-radius: 14px; }
      .btn-row { gap: 8px; }
      button.btn { padding: 12px 20px; font-size: 0.8rem; border-radius: 12px; }
      .end-box { padding: 32px 20px; }
      .end-emoji { font-size: 2.5rem; }
      .end-score { font-size: 2.2rem; }
    }

    /* ─── Small phones (< 380px) ─── */
    @media (max-width: 380px) {
      .poke-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
      .poke-cell { font-size: 1.3rem; }

// ═══════════════════════════════════════════════════
// GAME ENGINE
// ═══════════════════════════════════════════════════
const GRID_SIZE = 6;
const LETTERS = ['A','B','C','D'];
const BOX_COLORS = ['poke-c1','poke-c2','poke-c3','poke-c4','poke-c5','poke-c6','poke-c7','poke-c8'];
const BOX_ICONS = ['🎲','🌟','❓','🎯','🎪','🎁','🔮','🃏','🎭','💎','🎨','🌈','🎵','🦋','🍀','⭐','🎈','🔥','🌸','✨'];

const state = {
  questions: [], cells: [], openedCount: 0, score: 0, streak: 0, best: 0,
  currentQ: null, locked: false
};

const $ = id => document.getElementById(id);

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function ql(q, field) { return (q[field] && (q[field][lang] || q[field].en)) || ''; }

// ─── Build poke grid ───
function buildGrid() {
  // Ensure: 1 of each type + no duplicate categories + avoid similar topics
  const byType = {image:[], flag:[], mc:[], tf:[]};
  QUESTIONS.forEach(q => { if (byType[q.type]) byType[q.type].push(q); });
  const picks = [];
  const usedCats = new Set();
  const usedKeywords = new Set();

  function getKeywords(q) {
    const txt = (q.q.en || '').toLowerCase();
    const kws = [];
    if (txt.includes('vilnius')) kws.push('vilnius');
    if (txt.includes('flag')) kws.push('flag');
    if (txt.includes('basketball')) kws.push('basketball');
    if (txt.includes('amber')) kws.push('amber');
    if (txt.includes('stork')) kws.push('stork');
    if (txt.includes('cepelinai') || txt.includes('dumpling')) kws.push('cepelinai');
    if (txt.includes('cross')) kws.push('crosses');
    if (txt.includes('balloon')) kws.push('balloon');
    if (txt.includes('forest')) kws.push('forest');
    if (txt.includes('baltic way') || txt.includes('1989')) kws.push('balticway');
    if (txt.includes('uzupis') || txt.includes('užupis')) kws.push('uzupis');
    return kws;
  }

  function canPick(q) {
    // Allow max 2 per category
    const catCount = picks.filter(p => p.category === q.category).length;
    if (catCount >= 2) return false;
    // No overlapping keywords
    const kws = getKeywords(q);
    if (kws.some(k => usedKeywords.has(k))) return false;
    return true;
  }

  function addPick(q) {
    picks.push(q);
    usedCats.add(q.category);
    getKeywords(q).forEach(k => usedKeywords.add(k));
  }

  // Step 1: one of each type, diverse categories
  ['image','flag','mc','tf'].forEach(typ => {
    const pool = shuffle(byType[typ]);
    for (const q of pool) {
      if (canPick(q)) { addPick(q); break; }
    }
  });

  // Step 2: fill remaining with diverse picks
  const rest = shuffle(QUESTIONS.filter(q => !picks.includes(q)));
  for (const q of rest) {
    if (picks.length >= GRID_SIZE) break;
    if (canPick(q)) addPick(q);
  }

  state.questions = shuffle(picks);
  state.cells = [];
  state.openedCount = 0; state.score = 0; state.streak = 0;
  const grid = $('poke-grid');
  grid.innerHTML = '';
  const icons = shuffle(BOX_ICONS).slice(0, GRID_SIZE);
  for (let i = 0; i < GRID_SIZE; i++) {
    const btn = document.createElement('button');
    btn.className = `poke-cell ${BOX_COLORS[i % BOX_COLORS.length]}`;
    btn.textContent = icons[i];
    btn.dataset.index = i;
    btn.addEventListener('click', () => pokeBox(i, btn));
    grid.appendChild(btn);
    state.cells.push(btn);
  }
  $('p-total').textContent = GRID_SIZE;
  updatePokeStats();
  showPokeScreen();
}

function showPokeScreen() {
  $('question-screen').classList.remove('active');
  $('end-overlay').classList.remove('show');
}

function showQuestionScreen() {
  $('question-screen').classList.add('active');
}

function updatePokeStats() {
  $('p-score').textContent = state.score;
  $('p-opened').textContent = state.openedCount;
  $('p-streak').textContent = state.streak;
}

function pokeBox(idx, btn) {
  if (btn.classList.contains('opened') || state.locked) return;
  state.locked = true;
  // Animate current
  state.cells.forEach(c => c.classList.remove('current'));
  btn.classList.add('current','opened');
  state.openedCount++;
  updatePokeStats();

  // Show question after brief delay
  setTimeout(() => {
    state.currentQ = state.questions[idx];
    renderQuestion(state.questions[idx]);
    showQuestionScreen();
    state.locked = false;
  }, 500);
}

// ─── Render question ───
function renderQuestion(q) {
  const badge = $('q-badge');
  badge.className = `q-badge ${q.category}`;
  badge.textContent = t(q.category);

  const typeLabel = $('q-type-label');
  const typeMap = {mc:'mcLabel', tf:'tfLabel', flag:'flagLabel', emoji:'emojiLabel', image:'imageLabel'};
  typeLabel.textContent = t(typeMap[q.type] || 'mcLabel');

  $('q-text').textContent = ql(q, 'q');

  // Visual area
  const visual = $('q-visual');
  visual.innerHTML = '';
  if (q.type === 'emoji' && q.emoji) {
    visual.innerHTML = `<div class="q-emoji-display">${q.emoji}</div>`;
  } else if (q.type === 'image' && q.imageUrl) {
    visual.innerHTML = `<div class="q-image-display"><img src="${q.imageUrl}" alt="Question image" loading="eager"></div>`;
  }

  // Options
  const optWrap = $('q-options');
  optWrap.innerHTML = '';

  if (q.type === 'tf') {
    optWrap.className = 'options-grid';
    [true, false].forEach((val, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.innerHTML = `<span class="opt-letter">${val ? '✓' : '✗'}</span>${val ? t('trueLabel') : t('falseLabel')}`;
      btn.addEventListener('click', () => pickAnswer(i, val === q.answer, btn, optWrap, q));
      optWrap.appendChild(btn);
    });
  } else if (q.type === 'flag') {
    optWrap.className = 'options-grid';
    q.flagOptions.forEach((fid, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-flag-btn';
      const stripes = FLAGS[fid].map(s => `<div style="background:${s.color}"></div>`).join('');
      const overlay = FLAG_OVERLAYS[fid] || '';
      btn.innerHTML = `<div class="flag-preview">${stripes}${overlay}</div>`;
      btn.addEventListener('click', () => pickAnswer(i, i === q.answer, btn, optWrap, q));
      optWrap.appendChild(btn);
    });
  } else if (q.type === 'image') {
    // Image questions use same MC layout
    optWrap.className = 'options-grid';
    const opts = ql(q, 'options');
    opts.forEach((text, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span>${text}`;
      btn.addEventListener('click', () => pickAnswer(i, i === q.answer, btn, optWrap, q));
      optWrap.appendChild(btn);
    });
  } else {
    // mc or emoji
    optWrap.className = 'options-grid';
    const opts = ql(q, 'options');
    opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span>${opt}`;
      btn.addEventListener('click', () => pickAnswer(i, i === q.answer, btn, optWrap, q));
      optWrap.appendChild(btn);
    });
  }

  // Hide feedback until answer is picked (no hints)
  const fb = $('fb-card');
  fb.classList.remove('correct-state','wrong-state');
  fb.style.display = 'none';
  $('fb-heading').textContent = '';
  $('fb-body').textContent = '';
  $('fact').textContent = '';
  $('fact-card').style.display = 'none';
  $('next-btn').disabled = true;

  // Re-animate card
  const card = $('q-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = ''; });
}

function pickAnswer(idx, isCorrect, btn, container, q) {
  if (state.locked) return;
  state.locked = true;

  // Show feedback card now
  const fb = $('fb-card');
  fb.style.display = '';
  $('fact-card').style.display = '';
  const allBtns = container.querySelectorAll('button');

  if (q.type === 'tf') {
    allBtns.forEach((b, i) => {
      b.disabled = true;
      if ((i === 0 && q.answer === true) || (i === 1 && q.answer === false)) b.classList.add('correct');
    });
  } else {
    allBtns.forEach((b, i) => {
      b.disabled = true;
      if (i === q.answer) b.classList.add('correct');
    });
  }

  if (isCorrect) {
    state.score++; state.streak++;
    state.best = Math.max(state.best, state.streak);
    fb.classList.add('correct-state');
    $('fb-heading').textContent = t('correct');
    launchQuizConfetti();
    if (q.type === 'tf') {
      $('fb-body').textContent = q.answer ? t('trueLabel') + ' ' + t('rightAnswer') : t('falseLabel') + ' ' + t('rightAnswer');
    } else {
      const opts = ql(q, q.type === 'flag' ? 'flagLabels' : 'options');
      $('fb-body').textContent = `${opts[q.answer]} ${t('rightAnswer')}`;
    }
  } else {
    btn.classList.add('wrong');
    state.streak = 0;
    fb.classList.add('wrong-state');
    $('fb-heading').textContent = t('wrong');
    if (q.type === 'tf') {
      $('fb-body').textContent = `${t('wasCorrect')} ${q.answer ? t('trueLabel') : t('falseLabel')}.`;
    } else {
      const opts = ql(q, q.type === 'flag' ? 'flagLabels' : 'options');
      $('fb-body').textContent = `${t('wasCorrect')} ${opts[q.answer]}.`;
    }
  }

  $('fact').innerHTML = `<strong>💡</strong> ${ql(q, 'fact')}`;
  $('next-btn').disabled = false;
  updatePokeStats();
}

// ─── Navigation ───
$('next-btn').addEventListener('click', () => {
  state.locked = false;
  if (state.openedCount >= GRID_SIZE) {
    showEnd();
  } else {
    showPokeScreen();
  }
});

$('back-grid-btn').addEventListener('click', () => {
  state.locked = false;
  if (state.openedCount >= GRID_SIZE) {
    showEnd();
  } else {
    showPokeScreen();
  }
});

function showEnd() {
  const pct = state.score / GRID_SIZE;
  $('end-score').textContent = `${state.score} / ${GRID_SIZE}`;
  $('end-emoji').textContent = pct >= 1 ? '🏆' : pct >= 0.8 ? '🎉' : pct >= 0.5 ? '😊' : '📚';
  $('end-label').textContent = pct >= 1 ? t('perfect') : pct >= 0.8 ? t('great') : pct >= 0.5 ? t('good') : t('learn');
  $('end-overlay').classList.add('show');
  if (pct >= 0.8) launchConfetti();
}

function launchConfetti() {
  const wrap = $('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#FDB913','#006A44','#C1272D','#3B82F6','#EC4899','#F97316'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (2 + Math.random() * 2) + 's';
    el.style.animationDelay = Math.random() * 1.5 + 's';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    wrap.appendChild(el);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 5000);
}

function launchQuizConfetti() {
  const colors = ['#FDB913','#006A44','#C1272D','#FFD700','#4ECDC4','#A855F7'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}vw;top:-10px;z-index:200;pointer-events:none;border-radius:${Math.random()>0.5?'50%':'2px'};animation:confetti-fall ${2+Math.random()*1.5}s ease-out ${Math.random()*0.6}s forwards;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

$('end-play').addEventListener('click', () => { buildGrid(); });

// ─── Language inheritance ───
function initLang() {
  // 1. Check URL param
  const params = new URLSearchParams(window.location.search);
  const urlLang = params.get('lang');
  if (urlLang && UI[urlLang]) { lang = urlLang; }
  // 2. Fallback to localStorage
  else {
    const stored = localStorage.getItem('lt_quiz_lang');
    if (stored && UI[stored]) { lang = stored; }
  }
  // Update button state
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
}

function saveLang() {
  localStorage.setItem('lt_quiz_lang', lang);
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    lang = btn.dataset.lang;
    saveLang();
    applyLang();
    buildGrid();
  });
});

// ─── Init ───
initLang();
applyLang();
buildGrid();
</script>
