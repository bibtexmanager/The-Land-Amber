<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lithuania Photo Quiz</title>
  <style>
    :root {
      --yellow: #fdb913;
      --green: #006a44;
      --red: #c1272d;
      --ink: #141414;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(193, 39, 45, 0.18), transparent 26%),
        radial-gradient(circle at bottom right, rgba(0, 106, 68, 0.2), transparent 30%),
        linear-gradient(180deg, #fcf3ea, #f3efe7 46%, #fffaf6);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }
    .hero {
      border: 2px solid var(--ink);
      border-radius: 28px;
      background: rgba(255,255,255,0.82);
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }
    .sub {
      margin: 0;
      line-height: 1.7;
      max-width: 64ch;
    }
    .layout {
      display: grid;
      gap: 18px;
      grid-template-columns: 0.88fr 1.12fr;
    }
    .panel {
      border: 2px solid var(--ink);
      border-radius: 24px;
      background: rgba(255,255,255,0.86);
      padding: 20px;
      box-shadow: 0 14px 28px rgba(0,0,0,0.06);
    }
    .prompt {
      font-size: 1.7rem;
      line-height: 1.15;
      margin: 0 0 14px;
    }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .pill {
      border: 2px solid var(--ink);
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
    }
    .feedback {
      min-height: 106px;
      line-height: 1.7;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--yellow);
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: white;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .card {
      border: 2px solid var(--ink);
      border-radius: 24px;
      padding: 12px;
      background: #fffdf8;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }
    .card:hover {
      transform: translateY(-3px);
    }
    .card.correct { outline: 4px solid #2c9b5c; }
    .card.wrong { outline: 4px solid #cf5555; }
    .art {
      height: 190px;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(20, 20, 20, 0.24);
      background: #f0f0f0;
    }
    .art svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .label {
      margin-top: 10px;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
    }
    @media (max-width: 950px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Lithuania Photo Quiz</h1>
      <p class="sub">
        This variant adds photo-style image questions to the booth flow. It is a better fit for
        casual visitors because they can play visually instead of reading a long block of text.
      </p>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="stats">
          <span class="pill" id="score">Score 0</span>
          <span class="pill" id="round">Round 1 / 6</span>
        </div>
        <p class="prompt" id="prompt"></p>
        <div class="feedback" id="feedback">
          Choose the image that matches the prompt.
        </div>
        <div class="controls">
          <button id="next" disabled>Next</button>
          <button class="secondary" id="restart">Restart</button>
          <button class="secondary" onclick="location.href='../index.html'">Hub</button>
        </div>
      </div>

      <div class="cards" id="cards"></div>
    </section>
  </div>

  <script>
    const art = {
      amber: `
        <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="220" fill="#f6e6c8"/>
          <ellipse cx="160" cy="168" rx="108" ry="22" fill="#d7b98a"/>
          <path d="M116 70 C130 44, 182 42, 204 70 C220 90, 214 128, 184 150 C154 174, 114 156, 106 120 C100 96, 104 86, 116 70Z" fill="#e5a329" stroke="#8b5a11" stroke-width="6"/>
          <circle cx="150" cy="92" r="20" fill="rgba(255,255,255,0.28)"/>
        </svg>`,
      trakai: `
        <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="220" fill="#bfe3f3"/>
          <rect y="136" width="320" height="84" fill="#6cb0d8"/>
          <rect x="86" y="90" width="150" height="62" fill="#c4533f"/>
          <rect x="112" y="52" width="32" height="98" fill="#ae3e30"/>
          <polygon points="128,28 152,54 104,54" fill="#6e2b24"/>
          <rect x="184" y="62" width="28" height="88" fill="#ae3e30"/>
          <polygon points="198,40 220,64 176,64" fill="#6e2b24"/>
          <rect x="148" y="108" width="28" height="44" fill="#5b2d20"/>
          <path d="M20 176 C80 164, 130 164, 200 176 C240 182, 280 186, 320 178" stroke="#dceef8" stroke-width="6" fill="none"/>
        </svg>`,
      crosses: `
        <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="220" fill="#d8e6f2"/>
          <rect y="150" width="320" height="70" fill="#9b825f"/>
          <g stroke="#5a3d26" stroke-width="8">
            <line x1="86" y1="80" x2="86" y2="178"/><line x1="58" y1="110" x2="114" y2="110"/>
            <line x1="154" y1="58" x2="154" y2="188"/><line x1="122" y1="96" x2="186" y2="96"/>
            <line x1="222" y1="74" x2="222" y2="182"/><line x1="196" y1="108" x2="248" y2="108"/>
          </g>
          <g stroke="#7b5838" stroke-width="5">
            <line x1="118" y1="104" x2="118" y2="170"/><line x1="98" y1="126" x2="138" y2="126"/>
            <line x1="260" y1="104" x2="260" y2="184"/><line x1="240" y1="128" x2="280" y2="128"/>
          </g>
        </svg>`,
      cepelinai: `
        <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="220" fill="#f4ecdf"/>
          <ellipse cx="160" cy="152" rx="108" ry="34" fill="#ffffff" stroke="#cfc4b3" stroke-width="6"/>
          <ellipse cx="126" cy="146" rx="42" ry="28" fill="#d6b882"/>
          <ellipse cx="192" cy="144" rx="44" ry="30" fill="#d7b77c"/>
          <path d="M102 140 C118 128, 140 128, 150 144" stroke="#8b5a2b" stroke-width="6" fill="none"/>
          <path d="M170 140 C188 128, 210 130, 220 146" stroke="#8b5a2b" stroke-width="6" fill="none"/>
          <circle cx="136" cy="126" r="6" fill="#6a4b2f"/>
          <circle cx="198" cy="124" r="6" fill="#6a4b2f"/>
        </svg>`,
      soup: `
        <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="220" fill="#eef2f4"/>
          <ellipse cx="160" cy="154" rx="112" ry="36" fill="#ffffff" stroke="#cfd6da" stroke-width="6"/>
          <ellipse cx="160" cy="148" rx="92" ry="24" fill="#f2528e"/>
          <circle cx="118" cy="146" r="12" fill="#ffffff"/>
          <circle cx="188" cy="142" r="10" fill="#ffffff"/>
          <rect x="144" y="130" width="12" height="36" rx="6" fill="#5bbd69"/>
          <rect x="170" y="132" width="12" height="30" rx="6" fill="#5bbd69"/>
        </svg>`,
      dunes: `
        <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="220" fill="#93d0ef"/>
          <rect y="126" width="320" height="94" fill="#5ea3cc"/>
          <path d="M0 170 C62 120, 120 106, 190 138 C222 152, 264 176, 320 168 L320 220 L0 220 Z" fill="#e4c47d"/>
          <path d="M62 158 C96 138, 124 136, 154 148" stroke="#d2b26f" stroke-width="5" fill="none"/>
          <path d="M182 150 C220 134, 258 146, 294 168" stroke="#d2b26f" stroke-width="5" fill="none"/>
        </svg>`,
      vilnius: `
        <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="220" fill="#e7f0f6"/>
          <rect y="156" width="320" height="64" fill="#b1c392"/>
          <rect x="82" y="112" width="42" height="44" fill="#c5654e"/>
          <rect x="128" y="84" width="54" height="72" fill="#d7d7d7"/>
          <rect x="194" y="100" width="44" height="56" fill="#d39e4a"/>
          <rect x="148" y="44" width="18" height="112" fill="#f4f0e6" stroke="#949494" stroke-width="4"/>
          <polygon points="157,18 178,46 136,46" fill="#b54a38"/>
        </svg>`,
      basketball: `
        <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="220" fill="#f0d29a"/>
          <rect x="40" y="34" width="240" height="152" rx="14" fill="#dca35a" stroke="#8b5a2b" stroke-width="6"/>
          <circle cx="160" cy="110" r="34" fill="none" stroke="#8b5a2b" stroke-width="6"/>
          <line x1="160" y1="34" x2="160" y2="186" stroke="#8b5a2b" stroke-width="6"/>
          <circle cx="160" cy="110" r="18" fill="#f18c2d" stroke="#8b4f14" stroke-width="5"/>
        </svg>`
    };

    const imageDefs = {
      amber: { label: "Baltic amber", art: art.amber },
      trakai: { label: "Trakai Castle", art: art.trakai },
      crosses: { label: "Hill of Crosses", art: art.crosses },
      cepelinai: { label: "Cepelinai", art: art.cepelinai },
      soup: { label: "Saltibarsciai", art: art.soup },
      dunes: { label: "Curonian dunes", art: art.dunes },
      vilnius: { label: "Vilnius skyline", art: art.vilnius },
      basketball: { label: "Basketball", art: art.basketball }
    };

    const rounds = [
      { prompt: "Which image shows Trakai Castle?", answer: "trakai", options: ["trakai", "dunes", "vilnius", "amber"] },
      { prompt: "Which image shows Baltic amber?", answer: "amber", options: ["crosses", "amber", "basketball", "soup"] },
      { prompt: "Which image shows Lithuania's famous cold pink soup?", answer: "soup", options: ["cepelinai", "soup", "dunes", "vilnius"] },
      { prompt: "Which image shows the Hill of Crosses?", answer: "crosses", options: ["crosses", "trakai", "basketball", "amber"] },
      { prompt: "Which image shows cepelinai?", answer: "cepelinai", options: ["soup", "cepelinai", "vilnius", "dunes"] },
      { prompt: "Which image is best for a Lithuania basketball fact?", answer: "basketball", options: ["basketball", "crosses", "amber", "trakai"] }
    ];

    const state = { order: [], index: 0, score: 0, locked: false };
    const promptEl = document.getElementById("prompt");
    const feedbackEl = document.getElementById("feedback");
    const cardsEl = document.getElementById("cards");
    const scoreEl = document.getElementById("score");
    const roundEl = document.getElementById("round");
    const nextBtn = document.getElementById("next");

    function shuffle(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function updateMeta() {
      scoreEl.textContent = "Score " + state.score;
      roundEl.textContent = "Round " + (state.index + 1) + " / " + state.order.length;
    }

    function renderRound() {
      const round = state.order[state.index];
      promptEl.textContent = round.prompt;
      feedbackEl.textContent = "Choose the image that matches the prompt.";
      cardsEl.innerHTML = "";
      state.locked = false;
      nextBtn.disabled = true;
      updateMeta();

      round.options.forEach((key) => {
        const def = imageDefs[key];
        const card = document.createElement("button");
        card.type = "button";
        card.className = "card";
        card.innerHTML = '<div class="art">' + def.art + '</div><div class="label">' + def.label + '</div>';
        card.addEventListener("click", () => pick(key, card));
        cardsEl.appendChild(card);
      });
    }

    function pick(key, card) {
      if (state.locked) return;
      state.locked = true;
      const round = state.order[state.index];
      const correct = key === round.answer;

      if (correct) {
        state.score += 1;
        card.classList.add("correct");
        feedbackEl.textContent = "Correct. " + imageDefs[key].label + " is a strong visual booth prompt.";
      } else {
        card.classList.add("wrong");
        [...cardsEl.children].forEach((node, idx) => {
          if (round.options[idx] === round.answer) node.classList.add("correct");
        });
        feedbackEl.textContent =
          "Not quite. The right image was " + imageDefs[round.answer].label + ".";
      }

      nextBtn.disabled = false;
      updateMeta();
    }

    nextBtn.addEventListener("click", () => {
      if (state.index < state.order.length - 1) {
        state.index += 1;
        renderRound();
        return;
      }
      promptEl.textContent = "Finished.";
      feedbackEl.textContent =
        "Final score: " + state.score + " / " + state.order.length +
        ". This is the visual variant you were asking for when you mentioned photo questions.";
      cardsEl.innerHTML = "";
      nextBtn.disabled = true;
      updateMeta();
    });

    document.getElementById("restart").addEventListener("click", start);

    function start() {
      state.order = shuffle(rounds);
      state.index = 0;
      state.score = 0;
      renderRound();
    }

    start();
  </script>
</body>
</html>
