<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lithuania Booth Mix</title>
  <style>
    :root {
      --yellow: #fdb913;
      --green: #006a44;
      --red: #c1272d;
      --ink: #121212;
      --paper: rgba(255,255,255,0.82);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(253,185,19,0.3), transparent 28%),
        radial-gradient(circle at top right, rgba(0,106,68,0.22), transparent 24%),
        radial-gradient(circle at bottom center, rgba(193,39,45,0.18), transparent 34%),
        linear-gradient(180deg, #f7f1e5, #fffaf3);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 26px 18px 42px;
    }
    .hero, .panel {
      border: 2px solid var(--ink);
      border-radius: 26px;
      background: var(--paper);
      box-shadow: 0 18px 40px rgba(0,0,0,0.08);
    }
    .hero {
      padding: 24px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 0.94;
      letter-spacing: -0.04em;
    }
    .sub {
      margin: 0;
      max-width: 64ch;
      line-height: 1.7;
    }
    .layout {
      display: grid;
      gap: 18px;
      grid-template-columns: 0.9fr 1.1fr;
    }
    .panel {
      padding: 20px;
    }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .pill {
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      padding: 8px 12px;
      font-weight: 700;
    }
    .prompt {
      font-size: 1.75rem;
      line-height: 1.14;
      margin: 0 0 14px;
    }
    .mode {
      display: inline-block;
      border: 2px solid var(--ink);
      border-radius: 999px;
      padding: 8px 12px;
      margin-bottom: 14px;
      background: #fff;
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }
    .feedback {
      min-height: 92px;
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--yellow);
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: white;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .answers {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .answer {
      border: 2px solid var(--ink);
      border-radius: 22px;
      background: #fffdf7;
      padding: 14px;
      cursor: pointer;
      transition: transform 0.16s ease;
      text-align: left;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      min-height: 160px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .answer:hover {
      transform: translateY(-3px);
    }
    .answer.correct { outline: 4px solid #2c9b5c; }
    .answer.wrong { outline: 4px solid #cf5555; }
    .answer-title {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.85rem;
    }
    .flag-box {
      height: 88px;
      border-radius: 14px;
      border: 2px solid rgba(18,18,18,0.25);
      overflow: hidden;
      display: grid;
    }
    .flag-lt { grid-template-rows: 1fr 1fr 1fr; }
    .flag-lt div:nth-child(1) { background: #fdb913; }
    .flag-lt div:nth-child(2) { background: #006a44; }
    .flag-lt div:nth-child(3) { background: #c1272d; }
    .flag-lv { grid-template-rows: 1fr 0.4fr 1fr; }
    .flag-lv div:nth-child(1), .flag-lv div:nth-child(3) { background: #8a1538; }
    .flag-lv div:nth-child(2) { background: white; }
    .flag-ee { grid-template-rows: 1fr 1fr 1fr; }
    .flag-ee div:nth-child(1) { background: #4891d9; }
    .flag-ee div:nth-child(2) { background: #111; }
    .flag-ee div:nth-child(3) { background: white; }
    .text-body {
      font-size: 1.06rem;
      line-height: 1.45;
    }
    .map-chip {
      display: inline-block;
      padding: 18px 14px;
      border-radius: 18px;
      border: 2px dashed rgba(18,18,18,0.3);
      background: linear-gradient(180deg, #cde5ec, #f4efe3);
      font-weight: 700;
      text-align: center;
    }
    .photo-art {
      height: 92px;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid rgba(18,18,18,0.25);
      background: #f0f0f0;
    }
    .photo-art svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    @media (max-width: 930px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Lithuania Booth Mix</h1>
      <p class="sub">
        A mixed-mode arcade build. This is the strongest booth option if you want one page instead
        of separate experiences, because it rotates between text, flag, photo, and geography rounds.
      </p>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="stats">
          <span class="pill" id="score">Score 0</span>
          <span class="pill" id="round">Round 1 / 8</span>
        </div>
        <div class="mode" id="mode">Mode</div>
        <p class="prompt" id="prompt"></p>
        <div class="feedback" id="feedback">Choose an answer to continue.</div>
        <div class="controls">
          <button id="next" disabled>Next</button>
          <button class="secondary" id="restart">Restart</button>
          <button class="secondary" onclick="location.href='../index.html'">Hub</button>
        </div>
      </div>

      <div class="panel">
        <div class="answers" id="answers"></div>
      </div>
    </section>
  </div>

  <script>
    function flagMarkup(code) {
      const box = document.createElement("div");
      const cls = {
        LT: "flag-lt",
        LV: "flag-lv",
        EE: "flag-ee"
      }[code];
      box.className = "flag-box " + cls;
      const parts = cls === "flag-lv" ? 3 : 3;
      for (let i = 0; i < parts; i++) box.appendChild(document.createElement("div"));
      return box.outerHTML;
    }

    const photo = {
      amber: `<svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg"><rect width="320" height="120" fill="#f7e6c6"/><ellipse cx="160" cy="98" rx="86" ry="12" fill="#d8b98d"/><path d="M118 34 C132 14, 182 14, 204 34 C220 48, 214 76, 188 92 C160 108, 118 98, 108 72 C104 58, 104 48, 118 34Z" fill="#e3a12c" stroke="#8a5b15" stroke-width="5"/><circle cx="148" cy="44" r="14" fill="rgba(255,255,255,0.28)"/></svg>`,
      trakai: `<svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg"><rect width="320" height="120" fill="#c1e5f4"/><rect y="74" width="320" height="46" fill="#6aaed2"/><rect x="104" y="50" width="112" height="40" fill="#c35240"/><rect x="124" y="24" width="24" height="64" fill="#aa3e31"/><polygon points="136,8 154,26 118,26" fill="#6a2922"/><rect x="176" y="34" width="22" height="54" fill="#aa3e31"/><polygon points="187,18 205,36 169,36" fill="#6a2922"/></svg>`,
      soup: `<svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg"><rect width="320" height="120" fill="#eef2f5"/><ellipse cx="160" cy="82" rx="96" ry="26" fill="#ffffff" stroke="#cfd7db" stroke-width="5"/><ellipse cx="160" cy="80" rx="78" ry="18" fill="#ef4c8a"/><circle cx="128" cy="80" r="10" fill="#fff"/><circle cx="184" cy="74" r="8" fill="#fff"/><rect x="152" y="66" width="10" height="28" rx="5" fill="#5cbf68"/></svg>`
    };

    const rounds = [
      {
        mode: "Text",
        prompt: "What is the capital of Lithuania?",
        answer: "Vilnius",
        options: [
          { title: "Vilnius", body: "Lithuania's capital city." },
          { title: "Kaunas", body: "A major Lithuanian city, but not the capital." },
          { title: "Riga", body: "Capital of Latvia." },
          { title: "Tallinn", body: "Capital of Estonia." }
        ]
      },
      {
        mode: "Flag",
        prompt: "Choose Lithuania's flag.",
        answer: "Lithuania",
        options: [
          { title: "Lithuania", flag: "LT" },
          { title: "Latvia", flag: "LV" },
          { title: "Estonia", flag: "EE" },
          { title: "Latvia again", flag: "LV" }
        ]
      },
      {
        mode: "Photo",
        prompt: "Which visual best matches Baltic amber?",
        answer: "Amber",
        options: [
          { title: "Amber", photo: "amber" },
          { title: "Trakai", photo: "trakai" },
          { title: "Pink soup", photo: "soup" },
          { title: "Map hint", map: "Sea coast booth item" }
        ]
      },
      {
        mode: "Map",
        prompt: "Which choice best matches Lithuania's sea connection?",
        answer: "Baltic Sea",
        options: [
          { title: "Baltic Sea", map: "Lithuania's coastline reaches the Baltic." },
          { title: "Black Sea", map: "Far too far south." },
          { title: "Mediterranean", map: "Wrong region entirely." },
          { title: "North Sea", map: "Not Lithuania." }
        ]
      },
      {
        mode: "Text",
        prompt: "Which sport is most associated with Lithuania?",
        answer: "Basketball",
        options: [
          { title: "Basketball", body: "Lithuania's best-known sport identity." },
          { title: "Cricket", body: "Not a Lithuania staple." },
          { title: "Baseball", body: "Not the main national sport." },
          { title: "Polo", body: "Definitely not the booth answer." }
        ]
      },
      {
        mode: "Photo",
        prompt: "Which image is the strongest booth visual for Trakai?",
        answer: "Trakai",
        options: [
          { title: "Amber", photo: "amber" },
          { title: "Pink soup", photo: "soup" },
          { title: "Trakai", photo: "trakai" },
          { title: "Baltic coastline", map: "Curonian-style coastline" }
        ]
      },
      {
        mode: "Flag",
        prompt: "Pick the country with the yellow, green, and red tricolor.",
        answer: "Lithuania",
        options: [
          { title: "Estonia", flag: "EE" },
          { title: "Lithuania", flag: "LT" },
          { title: "Latvia", flag: "LV" },
          { title: "Estonia again", flag: "EE" }
        ]
      },
      {
        mode: "Map",
        prompt: "Which choice best describes Lithuania's location?",
        answer: "Baltic region",
        options: [
          { title: "Iberian peninsula", map: "Spain and Portugal area" },
          { title: "Baltic region", map: "Lithuania sits in the Baltic region." },
          { title: "Balkans", map: "Too far southeast." },
          { title: "Scandinavia", map: "Close-ish, but not Lithuania." }
        ]
      }
    ];

    const state = { order: [], index: 0, score: 0, locked: false };
    const scoreEl = document.getElementById("score");
    const roundEl = document.getElementById("round");
    const modeEl = document.getElementById("mode");
    const promptEl = document.getElementById("prompt");
    const feedbackEl = document.getElementById("feedback");
    const answersEl = document.getElementById("answers");
    const nextBtn = document.getElementById("next");

    function shuffle(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function updateMeta() {
      scoreEl.textContent = "Score " + state.score;
      roundEl.textContent = "Round " + (state.index + 1) + " / " + state.order.length;
    }

    function answerMarkup(option) {
      if (option.flag) return flagMarkup(option.flag);
      if (option.photo) return '<div class="photo-art">' + photo[option.photo] + "</div>";
      if (option.map) return '<div class="map-chip">' + option.map + "</div>";
      return '<div class="text-body">' + option.body + "</div>";
    }

    function renderRound() {
      const round = state.order[state.index];
      modeEl.textContent = round.mode + " mode";
      promptEl.textContent = round.prompt;
      feedbackEl.textContent = "Choose an answer to continue.";
      answersEl.innerHTML = "";
      nextBtn.disabled = true;
      state.locked = false;
      updateMeta();

      round.options.forEach((option) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer";
        btn.innerHTML =
          '<div class="answer-title">' + option.title + "</div>" +
          answerMarkup(option);
        btn.addEventListener("click", () => pick(option.title, btn));
        answersEl.appendChild(btn);
      });
    }

    function pick(title, btn) {
      if (state.locked) return;
      state.locked = true;
      const round = state.order[state.index];
      const correct = title === round.answer;

      if (correct) {
        state.score += 1;
        btn.classList.add("correct");
        feedbackEl.textContent = "Correct. This mixed-mode format gives the booth much more replay value.";
      } else {
        btn.classList.add("wrong");
        [...answersEl.children].forEach((node, idx) => {
          if (round.options[idx].title === round.answer) node.classList.add("correct");
        });
        feedbackEl.textContent =
          "Not quite. The correct answer was " + round.answer + ".";
      }

      nextBtn.disabled = false;
      updateMeta();
    }

    nextBtn.addEventListener("click", () => {
      if (state.index < state.order.length - 1) {
        state.index += 1;
        renderRound();
        return;
      }
      modeEl.textContent = "Finished";
      promptEl.textContent = "Booth mix complete.";
      feedbackEl.textContent =
        "Final score: " + state.score + " / " + state.order.length +
        ". If you want only one public-facing game, this is the strongest variant.";
      answersEl.innerHTML = "";
      nextBtn.disabled = true;
      updateMeta();
    });

    document.getElementById("restart").addEventListener("click", start);

    function start() {
      state.order = shuffle(rounds);
      state.index = 0;
      state.score = 0;
      renderRound();
    }

    start();
  </script>
</body>
</html>
